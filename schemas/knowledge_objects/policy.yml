schema: knowledge_object_policy
version: 1
description: Typed source schema for Papyrus policies.
fields:
  id:
    kind: string
    required: true
    pattern: "^kb-[a-z0-9]+(?:-[a-z0-9]+)*$"
  title:
    kind: string
    required: true
  canonical_path:
    kind: string
    required: true
    pattern: "^(knowledge|archive/knowledge)/.+\\.md$"
  summary:
    kind: string
    required: true
  knowledge_object_type:
    kind: string
    required: true
    taxonomy: knowledge_object_types
  legacy_article_type:
    kind: string_or_null
    required: true
  status:
    kind: string
    required: true
    taxonomy: statuses
  owner:
    kind: string
    required: true
  source_type:
    kind: string
    required: true
    taxonomy: source_types
  source_system:
    kind: string
    required: true
  source_title:
    kind: string
    required: true
  team:
    kind: string
    required: true
    taxonomy: teams
  systems:
    kind: list[string]
    required: true
    taxonomy: systems
  tags:
    kind: list[string]
    required: true
    taxonomy: tags
  created:
    kind: date
    required: true
  updated:
    kind: date
    required: true
  last_reviewed:
    kind: date
    required: true
  review_cadence:
    kind: string
    required: true
    taxonomy: review_cadences
  audience:
    kind: string
    required: true
    taxonomy: audiences
  citations:
    kind: list[object]
    required: true
    required_keys:
      - source_title
      - source_type
      - source_ref
    allowed_keys:
      - article_id
      - claim_anchor
      - source_title
      - source_type
      - source_ref
      - note
      - excerpt
      - captured_at
      - validity_status
      - integrity_hash
      - evidence_snapshot_path
      - evidence_expiry_at
      - evidence_last_validated_at
  related_object_ids:
    kind: list[string]
    required: true
  policy_scope:
    kind: string
    required: true
  controls:
    kind: list[string]
    required: true
  exceptions:
    kind: string
    required: false
  superseded_by:
    kind: string_or_null
    required: true
  replaced_by:
    kind: string_or_null
    required: false
  retirement_reason:
    kind: string_or_null
    required: true
  services:
    kind: list[string]
    required: false
    taxonomy: services
  references:
    kind: list[object]
    required: false
    required_keys:
      - title
    allowed_keys:
      - article_id
      - title
      - path
      - url
      - note
  related_articles:
    kind: list[string]
    required: false
  change_log:
    kind: list[object]
    required: true
    required_keys:
      - date
      - summary
      - author
    allowed_keys:
      - date
      - summary
      - author
