policy: repository_contract
version: 1
directories:
  documentation_root: docs
  system_knowledge_root: knowledge
  knowledge_model_root: knowledge_engine
  decisions_root: decisions
  template_root: knowledge_engine/templates
  generated_roots:
    - generated
    - build
  runtime_retained_artifacts:
    - build/knowledge.db
    - generated/route-map.json
    - generated/route-map.md
  allowed_top_level_directories:
    - build
    - decisions
    - docs
    - generated
    - knowledge
    - knowledge_engine
    - reports
    - scripts
    - src
    - tests
  ignored_top_level_directories:
    - .git
    - .venv
    - __pycache__
    - .pytest_cache
  allowed_top_level_files:
    - .editorconfig
    - .gitattributes
    - .gitignore
    - AGENTS.md
    - README.md
    - pyproject.toml
    - requirements-dev.txt
    - requirements.txt
templates:
  approved_files:
    - known_error.md
    - runbook.md
    - service_record.md
  family_by_knowledge_object_type:
    runbook: runbook
    known_error: known_error
    service_record: service_record
lifecycle:
  active_navigation_statuses:
    - active
    - deprecated
  searchable_statuses_default:
    - active
    - deprecated
  searchable_status_order:
    - active
    - deprecated
    - draft
    - archived
source_workspace:
  article_roots:
    - knowledge
    - archive/knowledge
  canonical_write_roots:
    - knowledge
    - archive/knowledge
  archive_root: archive/knowledge
  local_ingest_read_roots:
    - build/local-ingest
  mutation_root: build/mutations
  backup_root: build/writeback-backups
duplicate_detection:
  title_similarity_threshold: 0.99
  doc_duplication_threshold: 0.96
