schema: knowledge_object_known_error
version: 1
description: Typed source schema for Papyrus known errors.
fields:
  id:
    kind: string
    required: true
    pattern: "^kb-[a-z0-9]+(?:-[a-z0-9]+)*$"
  title:
    kind: string
    required: true
  canonical_path:
    kind: string
    required: true
    pattern: "^(knowledge|archive/knowledge)/.+\\.md$"
  summary:
    kind: string
    required: true
  knowledge_object_type:
    kind: string
    required: true
    equals: known_error
  object_lifecycle_state:
    kind: string
    required: true
    taxonomy: statuses
  owner:
    kind: string
    required: true
  source_type:
    kind: string
    required: true
    taxonomy: source_types
  source_system:
    kind: string
    required: true
  source_title:
    kind: string
    required: true
  team:
    kind: string
    required: true
    taxonomy: teams
  systems:
    kind: list[string]
    required: true
    taxonomy: systems
  tags:
    kind: list[string]
    required: true
    taxonomy: tags
  created:
    kind: date
    required: true
  updated:
    kind: date
    required: true
  last_reviewed:
    kind: date
    required: true
  review_cadence:
    kind: string
    required: true
    taxonomy: review_cadences
  audience:
    kind: string
    required: true
    taxonomy: audiences
  related_services:
    kind: list[string]
    required: true
    taxonomy: services
  symptoms:
    kind: list[string]
    required: true
  scope:
    kind: string
    required: true
  cause:
    kind: string
    required: true
  diagnostic_checks:
    kind: list[string]
    required: true
  mitigations:
    kind: list[string]
    required: true
  permanent_fix_status:
    kind: string
    required: true
    taxonomy: permanent_fix_status
  citations:
    kind: list[object]
    required: true
    required_keys:
      - source_title
      - source_type
      - source_ref
    allowed_keys:
      - object_id
      - claim_anchor
      - source_title
      - source_type
      - source_ref
      - note
      - excerpt
      - captured_at
      - validity_status
      - integrity_hash
      - evidence_snapshot_path
      - evidence_expiry_at
      - evidence_last_validated_at
  related_object_ids:
    kind: list[string]
    required: true
  superseded_by:
    kind: string_or_null
    required: true
  replaced_by:
    kind: string_or_null
    required: false
  retirement_reason:
    kind: string_or_null
    required: true
  services:
    kind: list[string]
    required: false
    taxonomy: services
  prerequisites:
    kind: list[string]
    required: false
  steps:
    kind: list[string]
    required: false
  verification:
    kind: list[string]
    required: false
  rollback:
    kind: list[string]
    required: false
  references:
    kind: list[object]
    required: false
    required_keys:
      - title
    allowed_keys:
      - object_id
      - title
      - path
      - url
      - note
  change_log:
    kind: list[object]
    required: true
    required_keys:
      - date
      - summary
      - author
    allowed_keys:
      - date
      - summary
      - author
