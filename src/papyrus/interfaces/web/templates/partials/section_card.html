<section
  class="section-card {{ panel_role }} tone-{{ tone }} {{ css_class }}"
  data-component="surface-panel"
  data-variant="{{ component_variant }}"
  data-surface="{{ component_surface }}"
>
  <header>
    <p class="panel-kicker">{{ eyebrow }}</p>
    <h2>{{ title }}</h2>
    {{ summary_html }}
  </header>
  <div class="{{ body_class }}">
    {{ body_html }}
  </div>
  {{ footer_html }}
</section>
