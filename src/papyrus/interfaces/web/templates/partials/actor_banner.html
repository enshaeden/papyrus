<section class="actor-banner actor-banner--{{ actor_role_class }}" aria-label="Actor context">
  <div class="actor-banner-primary">
    <span class="actor-banner-chip-label">Working as</span>
    <span class="actor-banner-chip actor-banner-chip-identity">{{ actor_display_name }}</span>
    <span class="actor-banner-role">{{ actor_role_label }}</span>
    <span class="actor-banner-chip actor-banner-chip-view">View: {{ current_view_label }}</span>
  </div>
  <p class="actor-banner-summary">{{ actor_role_summary }}</p>
  <div class="actor-banner-links">
    {{ quick_links_html }}
  </div>
</section>
