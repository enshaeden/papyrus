<header class="topbar">
  <div class="identity-block topbar-identity">
    <button id="nav-toggle" class="shell-toggle shell-toggle-nav" aria-label="Toggle navigation" type="button">
      <i data-lucide="panel-left-close"></i>
    </button>
    <div class="identity-lockup">
      <a class="identity-mark" href="{{ home_href }}">
        <span class="identity-mark__glyph"><i data-lucide="hexagon"></i></span>
        <span class="identity-mark__label">Papyrus</span>
      </a>
      <p class="identity-copy">Governed knowledge platform</p>
    </div>
  </div>
  <form class="topbar-search" action="{{ search_action }}" method="get">
    <label class="sr-only" for="global-search">Search Papyrus</label>
    <div class="topbar-search-field">
      <i data-lucide="search"></i>
      <input id="global-search" name="query" type="search" placeholder="Search knowledge, services, or IDs" value="{{ search_value }}" />
    </div>
    <button class="button button-primary topbar-search-submit" type="submit">Search</button>
  </form>
  <div class="topbar-shell-controls" aria-label="Shell controls">
    {{ topbar_menu_html }}
    <button id="aside-toggle" class="shell-toggle shell-toggle-aside" aria-label="Toggle context panel" type="button">
      <i data-lucide="panel-right-close"></i>
    </button>
  </div>
</header>
