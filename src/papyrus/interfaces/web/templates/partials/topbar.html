<header class="topbar">
  <div class="identity-block">
    <a class="identity-mark" href="/queue">Papyrus</a>
    <p class="identity-copy">Governed operational knowledge</p>
  </div>
  <form class="search-form" action="/queue" method="get">
    <label class="sr-only" for="global-search">Search Papyrus</label>
    <input id="global-search" name="query" type="search" placeholder="Search operational knowledge" value="{{ search_value }}" />
    <button type="submit">Search</button>
  </form>
  <form class="search-form" action="/actor/select" method="post">
    <label class="sr-only" for="actor-select">Current actor</label>
    <input type="hidden" name="next_path" value="" data-current-path />
    <select id="actor-select" name="actor" data-actor-select>
      {{ actor_options_html }}
    </select>
    <button type="submit">Switch View</button>
  </form>
  <nav class="quick-links">
    {{ quick_links_html }}
  </nav>
</header>
<script>
  (function () {
    const nextPath = document.querySelector("[data-current-path]");
    const select = document.querySelector("[data-actor-select]");
    if (!nextPath || !select) {
      return;
    }
    const cookie = document.cookie
      .split("; ")
      .find((item) => item.startsWith("papyrus_actor="));
    const value = cookie ? decodeURIComponent(cookie.split("=")[1]) : "local.operator";
    if ([...select.options].some((option) => option.value === value)) {
      select.value = value;
    }
    const syncNextPath = () => {
      const selected = select.options[select.selectedIndex];
      if (!selected) {
        nextPath.value = window.location.pathname + window.location.search;
        return;
      }
      nextPath.value = select.value === value
        ? window.location.pathname + window.location.search
        : (selected.dataset.home || "/queue");
    };
    syncNextPath();
    select.addEventListener("change", syncNextPath);
  })();
</script>
