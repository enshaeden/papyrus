<header class="topbar">
  <div class="identity-block topbar-identity">
    <button id="nav-toggle" class="button button-icon" aria-label="Toggle navigation" style="padding: 0 0.5rem; border: none; background: transparent; cursor: pointer; color: inherit;">
      <i data-lucide="menu" style="width: 20px; height: 20px;"></i>
    </button>
    <a class="identity-mark" href="{{ home_href }}">Papyrus</a>
  </div>
  <form class="topbar-search" action="{{ search_action }}" method="get">
    <label class="sr-only" for="global-search">Search Papyrus</label>
    <input id="global-search" name="query" type="search" placeholder="Search guidance, services, or IDs" value="{{ search_value }}" />
    <button class="button button-primary" type="submit">Search</button>
  </form>
  <div class="topbar-shell-controls" aria-label="Shell controls" style="display: flex; gap: 0.5rem; align-items: center;">
    {{ topbar_menu_html }}
    <button id="aside-toggle" class="button button-icon" aria-label="Toggle context panel" style="padding: 0 0.5rem; border: none; background: transparent; cursor: pointer; color: inherit;">
      <i data-lucide="panel-right" style="width: 20px; height: 20px;"></i>
    </button>
  </div>
</header>
