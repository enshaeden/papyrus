<section class="object-header" data-component="object-header" data-surface="object-detail">
  <div>
    <p class="object-meta">{{ object_type }} · Reference {{ object_id }}</p>
    <h2>{{ title }}</h2>
    <p class="object-summary">{{ summary }}</p>
  </div>
  <div class="object-header-side">
    <div class="badge-row">{{ badges_html }}</div>
    {{ actions_html }}
  </div>
</section>
