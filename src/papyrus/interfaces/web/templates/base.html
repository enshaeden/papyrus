<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title }} | Papyrus</title>
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="stylesheet" href="/static/css/pages.css" />
  <link rel="stylesheet" href="/static/css/home.css" />
  <link rel="stylesheet" href="/static/css/read.css" />
  <link rel="stylesheet" href="/static/css/article.css" />
  <link rel="stylesheet" href="/static/css/services.css" />
  <link rel="stylesheet" href="/static/css/health.css" />
  <link rel="stylesheet" href="/static/css/review.css" />
  <link rel="stylesheet" href="/static/css/activity.css" />
  <link rel="stylesheet" href="/static/css/revision.css" />
  <link rel="stylesheet" href="/static/css/impact.css" />
  <link rel="stylesheet" href="/static/css/ingest.css" />
</head>
<body>
  <div class="app-shell {{ shell_variant_class }}" data-actor="{{ actor_id }}" data-page-mode="{{ page_mode }}" data-page-density="{{ page_density }}">
    {{ topbar_html }}
    <div class="{{ shell_columns_class }}">
      {{ sidebar_html }}
      <main class="main-column {{ content_layout_class }}" data-surface="{{ page_surface }}" data-active-nav="{{ active_nav }}">
        {{ page_header_html }}
        {{ flash_html }}
        {{ content_html }}
      </main>
      {{ aside_column_html }}
    </div>
  </div>
  <script src="/static/js/filters.js" defer></script>
  <script src="/static/js/disclosure.js" defer></script>
  <script src="/static/js/forms.js" defer></script>
  <script src="/static/js/shell.js" defer></script>
  {{ scripts_html }}
</body>
</html>
