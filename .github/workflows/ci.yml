name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  substrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Bootstrap
        run: ./scripts/bootstrap.sh
      - name: Format check
        run: ./scripts/format.sh --check
      - name: Lint
        run: ./scripts/lint.sh
      - name: Type check
        run: ./scripts/typecheck.sh
      - name: Validate repository
        run: python3 scripts/validate.py
      - name: Check route map
        run: python3 scripts/build_route_map.py --check

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Bootstrap
        run: ./scripts/bootstrap.sh
      - name: Unit test suite
        run: python3 -m unittest discover -s tests
